services:
  postgres:
    image: postgres:16-alpine
    container_name: flora-todo-mvp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flora_todo_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - flora_todo_mvp_postgres:/var/lib/postgresql/data

volumes:
  flora_todo_mvp_postgres:
