<div class="container attendance-wrapper">
    <h2 class="cw-attendancetitle">출석표</h2>
    <div class="cw-wrapper">
        <div class="cw-attendancecalender">
            <div class="attendance-guide">

                    <p style="width: <!--/attendance_success_percent/-->;"></p>

            </div>
            <div class="month-btn">

                        <col width="14%" />

                        <col width="14%" />
                        <col width="14%" />
                        <col width="14%" />
                        <col width="14%" />
                        <col width="14%" />
                    </colgroup>
                    <thead>
                        <tr>
                            <th><div>일</div></th>
                            <th><div>월</div></th>
                            <th><div>화</div></th>
                            <th><div>수</div></th>
                            <th><div>목</div></th>
                            <th><div>금</div></th>
                            <th><div>토</div></th>
                        </tr>
                    </thead>
                    <tbody>
                        <!--/attendance_calendar/-->
                    </tbody>
                </table>
            </div>
        </div>
        <!--/if_link_attendance_ok/-->
        <div class="cw-attendancebtns">
            <a href="<!--/link_attendance_ok/-->" class="btn btn-primary btn-lg"><span>출석하기</span></a>
        </div>
