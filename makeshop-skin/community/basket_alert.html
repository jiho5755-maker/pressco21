<div id="cartPop" class="modal-wrap layer-basket">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title">장바구니 담기</span>
            <a href="<!--/layer_close_link/-->" class="btn-modal-close"></a>
        </div>
        <div class="modal-body">
            <div class="basket-cont">
                <dl class="basket-list">
                    <dt><a href="#none"><img src="<!--/basket_img/-->" alt="상품 섬네일" title="상품 섬네일"></a></dt>
                    <dd><!--/basket_msg/--></dd>
                </dl>
                <div class="btn-wrap">
                    <a href="<!--/continue_link/-->" class="btn btn-white"><span>쇼핑 계속하기</span></a>
                    <a href="<!--/basket_link/-->" class="btn btn-primary"><span>장바구니 확인</span></a>
                </div>
            </div>
            <!--/if_use_related_product/-->
            <div class="recommend-wrap">
                <h2 class="tit-recommend">
                    <!--/if_related_title(관련상품)/-->관련상품<!--/end_if/-->
                    <!--/if_related_title(카트프리)/-->무료배송 추천상품<!--/end_if/-->
                    <!--/if_related_title(최근본상품)/-->최근 본 상품<!--/end_if/-->
                </h2>
                <!--/if_product_list/-->
                <!--/block_product_list/-->
                <div class="recommend-item">
                    <!--/loop_product_list/-->
                    <dl class="basket-list">
                        <dt class="thumb"><a href="<!--/product_list@link/-->"><img src="<!--/product_list@image_m/-->" alt="상품 섬네일" title="상품 섬네일"></a></dt>
                        <dd class="prd-info">
                            <p><!--/product_list@name/--></p>
                            <span><strong class="price"><!--/if_product_list@price_replace/--><!--/product_list@price_replace/--><!--/else/--><!--/number/product_list@price_sell/--><!--/end_if/--></strong>원</span>
                        </dd>
                    </dl>
                    <!--/end_loop/-->
                </div>
                <!--/end_block/-->
                <!--/else/-->
                <div class="empty">추천 상품이 없습니다.</div>
                <!--/end_if/-->
                <!--/block_paging/-->
                <ul class="recommend-paging">
                    <li><!--/block_prev_page/--><a href="<!--/page_prev_link/-->" class="prev">prev</a><!--/end_block/--></li>
                    <li><strong><!--/current_page/--></strong> / <!--/total_page/--></li>
                    <li><!--/block_next_page/--><a href="<!--/page_next_link/-->" class="next">next</a><!--/end_block/--></li>
                </ul>
                <!--/end_block/-->
            </div>
            <!--/end_if/-->
        </div>
    </div>
</div>
