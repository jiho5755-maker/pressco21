<!--/include_header(1)/-->

<div class="container roulette-wrapper">
    <h2 class="cw-roulettetitle">룰렛 이벤트</h2>
    <div class="cw-wrapper">
        <div class="cw-rouletteresult">
            <div class="roulette-wrap">
                <div class="r-tit">
                    <h3><!--/roulette_name/--></h3>
                    <p><!--/roulette_start_date/--> ~ <!--/roulette_end_date/--></p>
                </div>
                <div class="r-box">
                    <!--/roulette_canvas/-->
                    <a href="<!--/link_start_roulette/-->" class="event-wheel-start"><span>START</span></a>
                    <img src="/images/common/pointer_01.png" class="event-wheel-pointer">
                </div>
            </div>
            <!--/if_use_roulette_notice/-->
            <div class="roulette-title">유의사항</div>
            <ul class="roulette-guide">
                <!--/roulette_notice_txt/-->
            </ul>
            <!--/end_if/-->
            <!--/if_use_roulette_comment/-->
            <div class="roulette-title">댓글</div>
            <!--/form_comment/-->
            <div class="opinion-write">
                <!--/input_comment(cw-textfield)/-->
                <a href="<!--/link_comment_insert/-->" class="btn btn-primary"><span>등록</span></a>
            </div>
            <!--/end_form/-->
            <!--/block_comment_list/-->
            <div class="opinion-list">
                <!--/if_roulette_comment_list/-->
                <!--/loop_roulette_comment_list/-->
                <div class="post">
                    <div class="benefit">
                        <!--/if_use_benefits_setting/-->
                        <strong><!--/roulette_comment_list@benefit/--></strong>
                        <!--/end_if/-->
                        <!--/if_roulette_comment_list@link_del/-->
                        <a href="<!--/roulette_comment_list@link_del/-->"><img src="//skin.makeshop.co.kr/skin/rw_shop/images/icons/bullet_delete.svg" alt="삭제"></a>
                        <!--/end_if/-->
                    </div>
                    <div class="content"><!--/roulette_comment_list@comment/--></div>
                    <div class="text-end">
                        <span class="id"><!--/roulette_comment_list@id/--></span>
                        <span class="date"><!--/date(%Y.%M.%D)/roulette_comment_list@date/--></span>
                    </div>
                </div>
                <!--/end_loop/-->
                <div class="cw-paging">
                    <!--/if_pager_roulette_comment_list::prev/-->
                    <a href="<!--/pager_roulette_comment_list::prev@link/-->"><img src="//skin.makeshop.co.kr/skin/rw_shop/images/icons/ico_cheveron_left.svg" alt="이전" width="16" height="16" /></a>
                    <!--/end_if/-->
                    <!--/if_pager_roulette_comment_list/-->
                        <!--/loop_pager_roulette_comment_list::page(5)/-->
                            <!--/if_pager_roulette_comment_list::page@current/-->
                            <a href="javascript:return false;" class="active"><!--/pager_roulette_comment_list::page/--></a>
                            <!--/else/-->
                            <a href="<!--/pager_roulette_comment_list::page@link/-->"><!--/pager_roulette_comment_list::page/--></a>
                            <!--/end_if/-->
                        <!--/end_loop/-->
                    <!--/end_if/-->
                    <!--/if_pager_roulette_comment_list::next/-->
                    <a href="<!--/pager_roulette_comment_list::next@link/-->"><img src="//skin.makeshop.co.kr/skin/rw_shop/images/icons/ico_cheveron_right.svg" alt="다음" width="16" height="16" /></a>
                    <!--/end_if/-->
                </div>
                <!--/else/-->
                <div class="post none">작성된 댓글이 없습니다.</div>
                <!--/end_if/-->
            </div>
            <!--/end_block/-->
            <!--/end_if/-->
            <!--/if_roulette_recommend_product/-->
            <div class="roulette-title">추천상품</div>
            <div class="view-recommend">
                <dd>
                    <div class="prds-list gallery">
                        <!--/loop_roulette_recommend_product/-->
                        <div class="prds-list--item">
                            <div class="prds--image">
                                <img src="<!--/roulette_recommend_product@image_m/-->" alt="상품 이미지" />
                            </div>
                            <div class="prds--wrap">
                                <div class="prds--name"><!--/roulette_recommend_product@name/--></div>
                                <!--/if_roulette_recommend_product@engname/-->
                                <div class="prds--engname"><!--/roulette_recommend_product@engname/--></div>
                                <!--/end_if/-->
                                <div class="prds--price-wrap">
                                    <div class="prices">
                                        <span class="price"><strong><!--/number/roulette_recommend_product@price_sell/--></strong>원</span>
                                        <span class="original"><span><!--/number/roulette_recommend_product@price_consumer/--></span>원</span>
                                    </div>
                                </div>
                            </div>
                            <a href="<!--/roulette_recommend_product@link/-->" class="link">상품링크</a>
                        </div>
                        <!--/end_loop/-->
                    </div><!-- .prds-list -->
                </dd>
            </div>
            <!--/end_if/-->
        </div>
        <!--/block_roulette_layer/-->
        <div class="pop-roulette-layer">
            <div class="pop-layer">
                <a href="#pop-roulette-layer-img" class="btn-close"><img src="//skin.makeshop.co.kr/skin/rw_shop/images/icons/bullet_delete.svg" alt="레이어 팝업 닫기"></a>
                <div class="title">
                    <span>짝짝짝~!</span>
                    <p>당첨을 축하드립니다.</p>
                </div>
                <p class="img"><img src="/images/common/pc_pop_layer_img.png"></p>
                <div class="benefit"><!--/block_layer_benefit/--><!--/end_block/--></div>
                <!--/if_use_layer_comment/-->
                    <div class="txt">행운의 당첨소감을 남겨주세요!</div>
                    <!--/form_layer_comment/-->
                    <!--/textarea_comment(cw-textfield)/-->
                    <a href="<!--/link_layer_comment_insert/-->" class="btn btn-primary btn-lg"><span>확인</span></a>
                    <!--/end_form/-->
                <!--/end_if/-->
            </div> <!-- pop-layer -->
        </div> <!-- pop-roulette_layer -->
        <!--/end_block/-->
    </div>
</div>

<!--/include_footer(1)/-->
