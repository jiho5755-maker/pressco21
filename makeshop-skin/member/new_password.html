<!-- container -->
<main class="container find-wrapper">
    <div class="find-wrap">

        </div>
        <!--/form_lost_password/-->
            <ul class="cw-tab">

                <li><a href="#find-pw">임시 비밀번호 발급</a></li>
            </ul>
            <!-- 아이디 찾기 -->

                <div class="radio-wrap">
                    <div class="form-check form-check-inline">

                    </div>
                    <div class="form-check form-check-inline">
                        <label class="form-check-label"><!--/radio_find_id_mobile/--> 휴대폰</label>
                    </div>
                </div>
                <div class="find-form">
                    <div class="form-textfield">

                        <div class="div-idtype" id="<!--/find_id_email_wrap/-->"><!--/input_find_id_email(cw-textfield)/--></div>
                        <div class="div-idtype" id="<!--/find_id_mobile_wrap/-->" style="display:none;"><!--/input_find_id_mobile(cw-textfield)/--></div>
                    </div>
                    <div class="btn-find">
                        <a href="<!--/link_find_id/-->" class="btn btn-primary btn-lg">아이디 찾기</a>

                <div class="radio-wrap">
                    <div class="form-check form-check-inline">
                        <label class="form-check-label"><!--/radio_find_pw_email/--> 이메일</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <label class="form-check-label"><!--/radio_find_pw_mobile/--> 휴대폰</label>
                    </div>
                    <!--/if_radio_find_pw_auth/-->
                    <div class="form-check form-check-inline">
                        <label class="form-check-label"><!--/radio_find_pw_auth/--> 본인인증</label>
                    </div>
                    <!--/end_if/-->
                </div>
                <!--/block_find_pw_input/-->
                <div class="find-form">
                    <div class="form-textfield">
                        <!--/input_user_id(cw-textfield)/-->
                        <div class="div-pwtype" id="<!--/find_pw_email_wrap/-->"><!--/input_email(cw-textfield)/--></div>
                        <div class="div-pwtype" id="<!--/find_pw_mobile_wrap/-->" style="display:none;"><!--/input_mobile(cw-textfield)/--></div>
                    </div>
                    <div class="btn-find">
                        <a href="<!--/link_find_pw/-->" class="btn btn-primary btn-lg">임시 비밀번호 발급</a>
                        <a href="<!--/link_login/-->" class="btn btn-white btn-lg">로그인</a>

                </div>

                            <p><!--/auth_method@title/--></p>
                        </a>
                        <!--/end_loop/-->
                        <!--/end_if/-->
                    </div>
                </div>
                <!--/end_block/-->
                <!--/end_if/-->
