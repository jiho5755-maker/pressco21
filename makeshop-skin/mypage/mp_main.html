<!-- container -->

                        <span class="img"><img src="//skin.makeshop.co.kr/skin/rw_shop/images/icons/ico_mypage_user.svg" alt=""></span>
                        <div>

                            <strong><!--/user_name/--></strong>님은 <!--/group_name/-->회원입니다.
                            <!--/if_buy_benefit_message/-->
                            <p><strong><!--/number/min_buy_price/-->원 이상 <!--/buy_method/-->구매시</strong>, <!--/buy_benefit_message/--></p>
                            <!--/end_if/-->
                            <!--/else/-->
                            <strong><!--/user_name/--></strong>님의 쇼핑정보
                            <!--/end_if/-->
                        </div>
                    </div>
                    <ul class="user-stats">
                        <!--/if_user_reserve/-->
                        <li>
                            <span>적립금</span>
                            <a href="<!--/link_reserve/-->"><strong><!--/number/user_reserve/--></strong></a>
                        </li>
                        <!--/end_if/-->
                        <!--/if_money/-->
                        <li>
                            <span>예치금</span>
                            <a href="<!--/link_money/-->"><strong><!--/number/money/--></strong></a>
                        </li>
                        <!--/end_if/-->
                        <!--/if_usable_point/-->
                        <li>
                            <span>포인트</span>
                            <a href="<!--/link_point/-->"><strong><!--/number/usable_point/--></strong></a>
                        </li>
                        <!--/end_if/-->

                        <li>

                </div>
                <div class="order-status">
                    <ul>
                        <li>
                            <span>주문접수</span>

                        <li>
                            <span>결제완료</span>
                            <strong><!--/three_month_order_ok/--></strong>

                        <li>
                            <span>상품준비중</span>
                            <strong><!--/three_month_delivery_ready/--></strong>
                        </li>
                        <li>
                            <span>배송중</span>
                            <strong class="cw-point-color"><!--/three_month_delivery_ing/--></strong>
                        </li>
                        <li>
                            <span>배송완료</span>
                            <strong><!--/three_month_delivery_ok/--></strong>
                        </li>
                    </ul>
                </div>
                <div class="cw-simpleboard order-list">

                        <!--/if_order_list@is_present/-->
                        <span class="cw-col-2">

                    <!--/else/-->
                    <div class="post no-data">주문 내역이 없습니다.</div>
                    <!--/end_if/-->

                        </div>
                        <!--/end_loop/-->
                        <!--/else/-->
                        <div class="post no-data">작성된 게시글이 없습니다.</div>
                        <!--/end_if/-->
                    </div>
                </section>
                <section class="content-list">
                <div class="sub-title">
                    <h3>관심상품</h3>
                    <a href="<!--/link_wish/-->" class="flex-right link-arrow">전체보기</a>

                        <p class="goods--subtitle sm"><!--/wishlist_product@subname/--></p>
                        <div class="goods--price-wrap sm">

                                <!--/if_wishlist_product@price_replace/-->
                                <!--/wishlist_product@price_replace/-->
                                <!--/else_if_wishlist_product@is_soldout/-->
                                Sold Out
                                <!--/else/-->
                                <!--/if_wishlist_product@price_discount/-->

                                <span class="original"><!--/number/wishlist_product@price_sell/-->원</span>
                                <!--/if_wishlist_product@discount_info(+1)/-->
                                <span class="discount"><!--/wishlist_product@discount_info/--></span>
                                <!--/end_if/-->
                                <!--/else/-->
                                <span class="price"><strong><!--/number/wishlist_product@price_sell/--></strong>원</span>
                                <!--/if_wishlist_product@price_consumer(+1)/-->
                                <span class="original"><!--/number/wishlist_product@price_consumer/-->원</span>
                                <!--/end_if/-->
                                <!--/if_wishlist_product@consumer_discount_rate(+1)/-->
                                <span class="discount"><!--/number/wishlist_product@consumer_discount_rate/-->%</span>
                                <!--/end_if/-->
                                <!--/end_if/-->
                                <!--/end_if/-->
                            </div>
                        </div>
                        <a href="<!--/wishlist_product@link/-->" class="link">상품링크</a>
                    </div><!-- .goods-list--item -->
                    <!--/end_loop/-->
                </div>

                </section>
