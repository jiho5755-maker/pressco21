<script type="text/javascript">
$(function() {
    $('#bigMatch .progress .red').css('width', <!--/bigmatch_recmd_percent_1/--> + '%');
    // 답글 토글
    $('#bigMatch .reply .tab li a').click(function(e) {
        e.preventDefault();
        $(this).parent().addClass('now').siblings().removeClass('now');
        $(this.hash).show().siblings('.lst').hide();
        var tab_name = $(this).attr('href');
     
        if (tab_name.charAt(1) == 's') {
           // 2번 상품 클릭시, 페이징 컨트롤
           $('#paging2').show();
           $('#paging1').hide();
        } else if (tab_name.charAt(1) == 'f') {
           // 1번 상품 클릭시, 페이징 컨트롤
           $('#paging1').show();
           $('#paging2').hide();
        }
    });
});
</script>
