<div class="container gift-wrapper">
    <h2 class="cw-gifttitle">사은품 리스트</h2>
    <div class="cw-wrapper">
        <div class="cw-giftlist">
            <!--/if_gift/-->
            <ul class="list-contents">
                <!--/loop_gift/-->
                <li>
                    <div class="subject">
                        <div class="image<!--/if_not_gift@image/--> noimg<!--/end_if/-->">
                            <!--/if_gift@image/-->
                            <img src="<!--/gift@image/-->" class="img" alt="이미지">
                            <!--/else/-->
                            <img src="//skin.makeshop.co.kr/skin/rw_shop/images/noimage.svg" alt="이미지">

                        </div>
                        <div class="name"><!--/notag/gift@name/--></div>

                        <!--/loop_gift@option/-->
                            <p>
                                <span><!--/gift@option@title/--></span>
                                <!--/gift@option@select(cw-select-box)/-->

                        <!--/end_loop/-->
