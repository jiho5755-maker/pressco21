# ============================================================
# n8n Staging Nginx 설정
# 파일 경로 (서버): /etc/nginx/sites-available/n8n-staging
#
# 설정 방법:
#   sudo nano /etc/nginx/sites-available/n8n-staging
#   # 이 파일 내용을 붙여넣기
#   sudo ln -s /etc/nginx/sites-available/n8n-staging /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo certbot --nginx -d n8n-staging.pressco21.com
# ============================================================

server {
    listen 80;
    server_name n8n-staging.pressco21.com;

    # Certbot이 이 블록에 SSL 설정을 자동 추가함
    # (certbot 실행 후 아래 내용이 자동으로 추가됨)
}

