# PRESSCO21 CRM v2 - Nginx 보안 강화 설정
# 배포: deploy/setup-security.sh 실행
# 작성: security-hardening-expert + 2026-03-07

server {
    listen [::]:443 ssl;
    listen 443 ssl;
    server_name crm.pressco21.com;

    # SSL (Certbot 관리)
    ssl_certificate /etc/letsencrypt/live/crm.pressco21.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.pressco21.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/crm;
    index index.html;

    # ─── 보안 헤더 ───
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    server_tokens off;

    # ─── Gzip 압축 ───
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # ─── 내부 세션 인증 체크 ───
    location = /_crm_auth_check {
        internal;
        proxy_pass http://127.0.0.1:9100/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-CRM-Automation-Key $http_x_crm_automation_key;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location @crm_login_redirect {
        return 302 $crm_login_redirect;
    }

    # ─── 로그인 / 로그아웃 ───
    location = /login {
        proxy_pass http://127.0.0.1:9100/login;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /auth/login {
        proxy_pass http://127.0.0.1:9100/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /auth/logout {
        proxy_pass http://127.0.0.1:9100/auth/logout;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /auth/health {
        proxy_pass http://127.0.0.1:9100/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── robots.txt (검색엔진 인덱싱 차단) ───
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # ─── API 프록시 (Basic Auth 제외, Rate Limit 적용) ───
    location /crm-proxy {
        auth_request /_crm_auth_check;
        limit_req zone=crm_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:5678/webhook/crm-proxy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # CORS 제한: CRM 도메인만 허용
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "https://crm.pressco21.com" always;
    }

    location /crm-payment-reminder {
        auth_request /_crm_auth_check;
        limit_req zone=crm_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:5678/webhook/crm-payment-reminder;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "https://crm.pressco21.com" always;
    }

    # ─── 정적 에셋 캐싱 ───
    location /assets/ {
        auth_request /_crm_auth_check;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /data/ {
        auth_request /_crm_auth_check;
        expires 1h;
        add_header Cache-Control "private, no-store";
    }

    location /images/ {
        auth_request /_crm_auth_check;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ─── React SPA fallback ───
    location / {
        auth_request /_crm_auth_check;
        auth_request_set $crm_login_redirect $upstream_http_x_auth_redirect;
        error_page 401 = @crm_login_redirect;
        try_files $uri $uri/ /index.html;
    }
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name crm.pressco21.com;

    if ($host = crm.pressco21.com) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
