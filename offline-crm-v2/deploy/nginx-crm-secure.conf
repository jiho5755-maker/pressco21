# PRESSCO21 CRM v2 - Nginx 보안 강화 설정
# 배포: deploy/setup-security.sh 실행
# 작성: security-hardening-expert + 2026-03-07

server {
    listen [::]:443 ssl;
    listen 443 ssl;
    server_name crm.pressco21.com;

    # SSL (Certbot 관리)
    ssl_certificate /etc/letsencrypt/live/crm.pressco21.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.pressco21.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/crm;
    index index.html;

    # ─── Basic Auth (전체 사이트 보호) ───
    auth_basic "PRESSCO21 CRM";
    auth_basic_user_file /etc/nginx/.htpasswd-crm;

    # ─── 보안 헤더 ───
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    server_tokens off;

    # ─── Gzip 압축 ───
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # ─── robots.txt (검색엔진 인덱싱 차단) ───
    location = /robots.txt {
        auth_basic off;
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # ─── API 프록시 (Basic Auth 제외, Rate Limit 적용) ───
    location /crm-proxy {
        auth_basic off;  # API는 x-crm-key 헤더로 인증
        limit_req zone=crm_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:5678/webhook/crm-proxy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # CORS 제한: CRM 도메인만 허용
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "https://crm.pressco21.com" always;
    }

    # ─── 정적 에셋 캐싱 ───
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ─── React SPA fallback ───
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name crm.pressco21.com;

    if ($host = crm.pressco21.com) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
