# PRESSCO21 CRM - Nginx 설정
# 위치: /etc/nginx/sites-available/crm
# 심링크: ln -s /etc/nginx/sites-available/crm /etc/nginx/sites-enabled/crm

server {
    listen 80;
    server_name crm.pressco21.com;

    # Let's Encrypt ACME 챌린지
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP → HTTPS 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name crm.pressco21.com;

    # SSL 인증서 (certbot이 자동 생성)
    ssl_certificate /etc/letsencrypt/live/crm.pressco21.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.pressco21.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 정적 파일 루트
    root /var/www/crm;
    index index.html;

    # Gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # /crm-proxy → n8n webhook 리버스 프록시
    location /crm-proxy {
        proxy_pass http://localhost:5678/webhook/crm-proxy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_hide_header Set-Cookie;
    }

    location /crm-payment-reminder {
        proxy_pass http://localhost:5678/webhook/crm-payment-reminder;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_hide_header Set-Cookie;
    }

    location = /webhook/crm/barobill/tax-invoices/issue {
        proxy_pass http://localhost:5678/webhook/crm/barobill/tax-invoices/issue;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_hide_header Set-Cookie;
    }

    location = /webhook/crm/barobill/tax-invoices/sync-status {
        proxy_pass http://localhost:5678/webhook/crm/barobill/tax-invoices/sync-status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 45s;
        proxy_connect_timeout 10s;
        proxy_hide_header Set-Cookie;
    }

    # 정적 에셋 캐싱 (JS/CSS/이미지)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # React SPA: 모든 경로 → index.html (React Router 처리)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
